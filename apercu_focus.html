<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Aperçu — Focus</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');
:root{
    --bg:#09090b;--surface:#131316;--surface2:#1a1a1f;--surface3:#222228;
    --border:rgba(255,255,255,.06);--text:#ececef;--text2:#71717a;
    --accent:#8b5cf6;--accent-glow:rgba(139,92,246,.15);--accent2:#34d399;--danger:#f43f5e;--warning:#f59e0b;
    --radius:14px;--radius-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;line-height:1.6;
     display:flex;flex-direction:column;height:100dvh;overflow:hidden;}
.topbar{position:static;display:flex;align-items:center;justify-content:space-between;padding:12px 20px;border-bottom:1px solid var(--border);}
.topbar h1{font-family:'Space Mono',monospace;font-size:.9rem;font-weight:600;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.container{max-width:540px;margin:0 auto;width:100%;flex:1;min-height:0;display:flex;flex-direction:column;padding:14px 20px 104px;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;}
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:99px;font-size:.7rem;font-weight:600;font-family:'Space Mono',monospace;}
.badge-accent{background:var(--accent-glow);color:var(--accent);}
.badge-warning{background:rgba(245,158,11,.12);color:var(--warning);}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:12px 24px;border-radius:99px;font-family:'DM Sans';font-size:.9rem;font-weight:600;border:none;cursor:pointer;width:100%;}
.btn-primary{background:var(--accent);color:#fff;}
.btn-ghost{background:transparent;color:var(--text);border:1px solid var(--border);}
.btn-success{background:var(--accent2);color:#fff;}
.btn-danger{background:var(--danger);color:#fff;}
.btn-sm{padding:8px 16px;font-size:.82rem;}
.progress-label{font-size:.75rem;color:var(--text2);text-align:center;font-family:'Space Mono',monospace;flex-shrink:0;margin-bottom:8px;}
.review-action-bar{position:fixed;bottom:0;left:0;right:0;z-index:110;background:rgba(9,9,11,.92);border-top:1px solid var(--border);padding:12px 16px;}
.action-buttons{display:grid;gap:10px;max-width:540px;margin:0 auto;}
.action-buttons.cols-2{grid-template-columns:56px 1fr;}
.action-buttons.cols-4{grid-template-columns:56px 1fr 1fr 1fr;}
.review-action-bar .btn{font-size:1rem;padding:16px 12px;}

/* ── Mise en page sans-scroll (identique à review.html) ── */
#swipeCard{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;margin-bottom:10px;}
.qpane{flex:1;min-height:0;display:flex;align-items:center;justify-content:center;}
#answer-section{flex:0 0 0;min-height:0;overflow:hidden;border-top:1px solid transparent;margin-top:0;padding-top:0;transition:opacity .4s ease,margin .3s,padding .3s,border-color .3s;}
#swipeCard.revealed #answer-section{flex:1 1 0;border-top-color:var(--border);margin-top:12px;padding-top:12px;}
.qpane .card-content,#answer-section .card-content{width:100%;height:100%;padding:0;display:flex;align-items:center;justify-content:center;}
.fit-pane{width:100%;height:100%;display:flex;align-items:center;justify-content:center;text-align:center;overflow:hidden;line-height:1.35;font-weight:500;}
.fit-pane img{max-width:100%;max-height:100%;object-fit:contain;border-radius:var(--radius-sm);}
#answer-section .fit-pane>div{color:var(--text);}
.review-meta{display:flex;gap:8px;justify-content:center;margin-bottom:8px;flex-shrink:0;}
.review-tools{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;flex-shrink:0;}
.swipe-indicator{display:none;}
</style>
</head>
<body>
<div class="topbar"><h1>Flashcards</h1><span class="badge badge-accent" style="font-size:.66rem;">APERÇU · Focus</span></div>

<div class="container">
    <div class="progress-label">13/32 <span style="margin-left:12px;color:var(--text2);">01:24</span></div>

    <div class="card" id="swipeCard">
        <div class="card-content qpane">
            <div class="fit-pane" data-max="42"><div>Vedette hollywoodienne, co-inventrice d'une base technique du Wi-Fi en 1940</div></div>
        </div>
        <div id="answer-section" style="opacity:0;pointer-events:none;">
            <div class="card-content">
                <div class="fit-pane" data-max="38"><div>Hedy Lamarr</div></div>
            </div>
        </div>
    </div>

    <div class="review-meta">
        <span class="badge badge-accent">Boîte 23</span>
        <span class="badge badge-warning">🔖 Marquée</span>
    </div>
    <div class="review-tools">
        <button class="btn btn-ghost btn-sm">🔖 Démarquer</button>
        <button class="btn btn-ghost btn-sm">✏️ Modifier</button>
        <button class="btn btn-ghost btn-sm" style="color:var(--danger)">🗑️ Supprimer</button>
    </div>
</div>

<div id="bar-show" class="review-action-bar">
    <div class="action-buttons cols-2">
        <button class="btn btn-ghost" style="font-size:1.4rem;color:var(--text2);" disabled>↶</button>
        <button onclick="revealAnswer()" class="btn btn-primary">Voir la réponse</button>
    </div>
</div>
<div id="bar-answer" class="review-action-bar" style="display:none;">
    <div class="action-buttons cols-4">
        <button class="btn btn-ghost" style="font-size:1.4rem;color:var(--text2);">↶</button>
        <button class="btn btn-danger">❌ Faux</button>
        <button class="btn btn-success">✅ Correct</button>
        <button class="btn btn-ghost">⏭️ Pass</button>
    </div>
</div>

<script>
function fitPane(pane){
  if(!pane||pane.querySelector('img'))return;
  const max=parseFloat(pane.dataset.max||'36');let size=max;pane.style.fontSize=size+'px';
  if(pane.clientHeight<24)return;
  let g=0;while(pane.scrollHeight>pane.clientHeight-3&&size>13&&g<90){size--;pane.style.fontSize=size+'px';g++;}
}
function fitAll(){document.querySelectorAll('#swipeCard .fit-pane').forEach(fitPane);}
function observeFit(){
  document.querySelectorAll('#swipeCard .fit-pane').forEach(function(p){
    fitPane(p);
    try{new ResizeObserver(function(){fitPane(p);}).observe(p);}catch(e){}
  });
}
window.addEventListener('load',observeFit);
window.addEventListener('resize',fitAll);
requestAnimationFrame(observeFit);
function revealAnswer(){
  document.getElementById('swipeCard').classList.add('revealed');
  const ans=document.getElementById('answer-section');ans.style.pointerEvents='auto';
  requestAnimationFrame(()=>ans.style.opacity='1');
  document.getElementById('bar-show').style.display='none';
  document.getElementById('bar-answer').style.display='';
}

</script>
</body>
</html>
